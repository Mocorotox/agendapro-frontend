<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cancelar cita — AgendaPro</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#F4F6F3;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:#fff;border-radius:24px;padding:48px 40px;max-width:440px;width:100%;text-align:center;box-shadow:0 24px 64px rgba(26,36,23,0.13);}
.icon{width:72px;height:72px;background:#FEF2F2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:32px;}
h1{font-size:28px;font-weight:700;color:#1A2417;margin-bottom:8px;}
p{font-size:14px;color:#4E6055;line-height:1.6;margin-bottom:32px;}
.btn-primary{display:block;width:100%;padding:16px;background:#3A6B4A;color:#fff;border:none;border-radius:14px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;margin-bottom:10px;}
.btn-ghost{display:block;width:100%;padding:14px;background:transparent;color:#4E6055;border:1.5px solid #DDE3D8;border-radius:14px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;text-decoration:none;}
.btn-primary:hover{background:#5C9470;}
.btn-ghost:hover{border-color:#3A6B4A;color:#3A6B4A;}
.confirm-box{background:#FEF2F2;border:1px solid #FECACA;border-radius:14px;padding:20px;margin-bottom:28px;display:none;}
.confirm-box p{color:#991B1B;font-size:13px;margin-bottom:16px;}
.status{font-size:12px;color:#879E8E;margin-top:16px;}
</style>
</head>
<body>
<div class="card" id="cardConfirm">
  <div class="icon">📅</div>
  <h1>¿Cancelar tu cita?</h1>
  <p>Esta acción liberará tu espacio en la agenda. ¿Estás seguro de que deseas cancelar?</p>
  <div class="confirm-box" id="confirmBox">
    <p>⚠️ Esta acción no se puede deshacer. Tu cita será eliminada del calendario.</p>
  </div>
  <a href="#" class="btn-primary" id="btnCancelar" onclick="cancelar(event)">Sí, cancelar mi cita</a>
  <a href="javascript:history.back()" class="btn-ghost">No, mantener mi cita</a>
</div>

<div class="card" id="cardResult" style="display:none">
  <div class="icon" id="icon">⏳</div>
  <h1 id="title">Procesando...</h1>
  <p id="desc">Un momento por favor.</p>
  <a href="#" class="btn-primary" id="btnNueva" style="display:none">Agendar nueva cita</a>
  <div class="status" id="status"></div>
</div>

<script src="api/config.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const id = params.get('id');
const tenant = params.get('tenant') || '';

if(!id){
  document.getElementById('cardConfirm').innerHTML = '<div class="icon">❌</div><h1>Link inválido</h1><p>Este link de cancelación no es válido.</p>';
} else {
  document.getElementById('confirmBox').style.display = 'block';
}

function cancelar(e){
  e.preventDefault();
  document.getElementById('cardConfirm').style.display = 'none';
  document.getElementById('cardResult').style.display = 'block';

  fetch(AGENDAPRO_CONFIG.N8N_BASE_URL + AGENDAPRO_CONFIG.WEBHOOK_CONFIRMAR, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ id_cita: id, accion: 'cancelar' })
  })
  .then(r => r.json())
  .then(() => {
    document.getElementById('icon').textContent = '✅';
    document.getElementById('title').textContent = 'Cita cancelada';
    document.getElementById('desc').textContent = 'Tu cita fue cancelada con éxito. Cuando quieras agendar otra, estaremos aquí.';
    document.getElementById('btnNueva').style.display = 'block';
    document.getElementById('btnNueva').href = `reservar.html?tenant=${tenant}`;
    document.getElementById('status').textContent = 'ID: ' + id.slice(0,8) + '...';
  })
  .catch(() => {
    document.getElementById('icon').textContent = '⚠️';
    document.getElementById('title').textContent = 'Error de conexión';
    document.getElementById('desc').textContent = 'No pudimos cancelar tu cita. Escríbenos por WhatsApp.';
  });
}
</script>
</body>
</html>
