<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingresar — AgendaPro</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F4F6F3;--surface:#FFFFFF;--surface-2:#EEF1EC;--border:#DDE3D8;
  --accent:#3A6B4A;--accent-2:#5C9470;--accent-lt:#EAF2EC;
  --text-1:#1A2417;--text-2:#4E6055;--text-3:#879E8E;--red:#DC2626;
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text-1);font-family:var(--font);-webkit-font-smoothing:antialiased;}
.blob{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;opacity:0.5;}
.blob-1{width:500px;height:500px;background:radial-gradient(circle,#C8DFC0,transparent 70%);top:-150px;right:-80px;}
.blob-2{width:350px;height:350px;background:radial-gradient(circle,#D5E8D4,transparent 70%);bottom:-100px;left:-60px;}
.wrap{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:28px;box-shadow:0 24px 64px rgba(26,36,23,0.13);padding:44px 40px;width:min(420px,100%);}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;justify-content:center;}
.logo-mark{width:38px;height:38px;background:var(--accent);border-radius:11px;display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:19px;height:19px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;}
.logo-name{font-size:20px;font-weight:700;letter-spacing:-0.3px;}
.logo-name span{color:var(--accent);}
h1{font-size:24px;font-weight:700;text-align:center;letter-spacing:-0.4px;margin-bottom:6px;}
.sub{font-size:13px;color:var(--text-2);text-align:center;margin-bottom:32px;}
.google-btn{width:100%;padding:13px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;font-family:var(--font);font-size:14px;font-weight:600;color:var(--text-1);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.18s;margin-bottom:20px;}
.google-btn:hover{border-color:var(--accent-2);background:var(--accent-lt);}
.google-btn svg{width:18px;height:18px;}
.divider{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider span{font-size:12px;color:var(--text-3);}
.field{margin-bottom:16px;}
.f-label{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-3);margin-bottom:6px;display:block;}
.f-input{width:100%;padding:13px 16px;background:var(--surface-2);border:1.5px solid var(--border);border-radius:12px;font-family:var(--font);font-size:14px;color:var(--text-1);outline:none;transition:all 0.2s;}
.f-input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(58,107,74,0.08);}
.f-input::placeholder{color:var(--text-3);}
.cta{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 14px rgba(58,107,74,0.28);}
.cta:hover:not(:disabled){background:var(--accent-2);transform:translateY(-1px);}
.cta:disabled{opacity:0.6;cursor:not-allowed;}
.toggle-mode{text-align:center;margin-top:20px;font-size:13px;color:var(--text-2);}
.toggle-mode a{color:var(--accent);font-weight:600;cursor:pointer;text-decoration:none;}
.msg{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none;}
.msg.error{background:#FEE2E2;color:var(--red);display:block;}
.msg.ok{background:var(--accent-lt);color:var(--accent);display:block;}
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="wrap">
  <div class="card">
    <div class="logo">
      <div class="logo-mark"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>
      <span class="logo-name">Agenda<span>Pro</span></span>
    </div>

    <h1 id="title">Bienvenido de vuelta</h1>
    <p class="sub" id="subtitle">Ingresa para gestionar tu negocio</p>

    <div class="msg" id="msg"></div>

    <button class="google-btn" onclick="loginGoogle()">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continuar con Google
    </button>

    <div class="divider"><span>o con tu correo</span></div>

    <div class="field">
      <label class="f-label">Correo electrónico</label>
      <input class="f-input" id="email" type="email" placeholder="tu@correo.com" autocomplete="email">
    </div>
    <div class="field">
      <label class="f-label">Contraseña</label>
      <input class="f-input" id="password" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="cta" id="submitBtn" onclick="submitAuth()">Ingresar</button>

    <div class="toggle-mode" id="toggleMode">
      ¿No tienes cuenta? <a onclick="toggleMode()">Regístrate</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="api/supabase.js"></script>
<script>
let mode = 'login'; // 'login' | 'signup'

function toggleMode(){
  mode = mode === 'login' ? 'signup' : 'login';
  document.getElementById('title').textContent = mode === 'login' ? 'Bienvenido de vuelta' : 'Crea tu cuenta';
  document.getElementById('subtitle').textContent = mode === 'login' ? 'Ingresa para gestionar tu negocio' : 'Regístrate para empezar';
  document.getElementById('submitBtn').textContent = mode === 'login' ? 'Ingresar' : 'Registrarme';
  document.getElementById('toggleMode').innerHTML = mode === 'login'
    ? '¿No tienes cuenta? <a onclick="toggleMode()">Regístrate</a>'
    : '¿Ya tienes cuenta? <a onclick="toggleMode()">Ingresa</a>';
  hideMsg();
}

function showMsg(text, type){
  const m = document.getElementById('msg');
  m.textContent = text; m.className = 'msg ' + type;
}
function hideMsg(){ document.getElementById('msg').className = 'msg'; }

async function loginGoogle(){
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/dashboard.html' }
  });
  if (error) showMsg(error.message, 'error');
}

async function submitAuth(){
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('submitBtn');
  if(!email || !password){ showMsg('Completa correo y contraseña', 'error'); return; }

  btn.disabled = true;
  btn.textContent = 'Procesando...';
  hideMsg();

  try {
    if(mode === 'login'){
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if(error) throw error;
      // Verificar que tenga tenant asignado
      const tenant = await getMiTenant();
      if(!tenant){
        showMsg('Tu cuenta aún no está vinculada a un negocio. Contacta al administrador.', 'error');
        await sb.auth.signOut();
        btn.disabled = false; btn.textContent = 'Ingresar';
        return;
      }
      window.location.href = `dashboard.html?tenant=${tenant.slug}`;
    } else {
      const { error } = await sb.auth.signUp({ email, password });
      if(error) throw error;
      showMsg('Cuenta creada. Un administrador debe vincularte a tu negocio antes de ingresar.', 'ok');
      btn.disabled = false; btn.textContent = 'Registrarme';
    }
  } catch(e){
    showMsg(e.message || 'Error de autenticación', 'error');
    btn.disabled = false;
    btn.textContent = mode === 'login' ? 'Ingresar' : 'Registrarme';
  }
}

// Si ya hay sesión activa, redirige directo al dashboard
(async () => {
  const tenant = await getMiTenant();
  if(tenant) window.location.href = `dashboard.html?tenant=${tenant.slug}`;
})();

document.addEventListener('keydown', e => { if(e.key === 'Enter') submitAuth(); });
</script>
</body>
</html>
